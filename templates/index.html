<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Bot Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background-color: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background-color: #1f1f1f; border: 1px solid #333; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .form-control { background-color: #2b2b2b; border: 1px solid #444; color: white; }
        .form-control:focus { background-color: #333; color: white; border-color: #0d6efd; }
        .table { color: #ccc; }
        .table-hover tbody tr:hover { background-color: #2a2a2a; }
        .btn-web { background-color: #0d6efd; color: white; }
        .btn-web:hover { background-color: #0b5ed7; color: white; }
        .modal-content { background-color: #1f1f1f; color: white; border: 1px solid #444; }
        .modal-header { border-bottom: 1px solid #333; }
        .modal-footer { border-top: 1px solid #333; }
        .status-running { color: #00ff88; font-weight: bold; }
        .status-stopped { color: #ff4d4d; font-weight: bold; }
        .status-loading { color: #ffcc00; font-weight: bold; }
        .stats-badge { background: #333; padding: 3px 8px; border-radius: 5px; font-size: 0.8rem; border: 1px solid #555; }
        pre#log-viewer { background: #000; color: #0f0; padding: 10px; height: 350px; overflow-y: scroll; border: 1px solid #444; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container mt-5">
    <h1 class="text-center mb-4 text-uppercase fw-bold" style="letter-spacing: 2px;">🤖 Ultimate Bot Manager</h1>

    <!-- Deploy Section -->
    <div class="card mb-5">
        <div class="card-header bg-dark text-info fw-bold">Deploy New Instance</div>
        <div class="card-body">
            <form action="/deploy" method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label text-secondary small">GitHub Repository</label>
                        <input type="text" name="repo_link" class="form-control" placeholder="https://github.com/username/repo" required>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label text-secondary small">Start File (Optional)</label>
                        <input type="text" name="start_file" class="form-control" placeholder="e.g. main.py">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label text-secondary small">Port (Optional)</label>
                        <input type="number" name="custom_port" class="form-control" placeholder="e.g. 5000">
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label text-secondary small">Environment Variables / Config (KEY=VALUE)</label>
                    <textarea name="env_vars" class="form-control font-monospace" rows="3" placeholder="BOT_TOKEN=123:ABC..."></textarea>
                </div>

                <button type="submit" class="btn btn-success w-100 fw-bold">⚡ INITIATE DEPLOYMENT</button>
            </form>
        </div>
    </div>

    <!-- Active List -->
    <h4 class="mb-3 border-bottom pb-2">Active Instances</h4>
    <div class="table-responsive">
        <table class="table table-dark table-hover rounded overflow-hidden align-middle">
            <thead class="bg-secondary">
                <tr>
                    <th>Name / Port</th>
                    <th>Resources</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="bot-table-body">
                <tr><td colspan="4" class="text-center p-4">Loading system status...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Config Modal -->
<div class="modal fade" id="configModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">⚙️ Edit Configuration</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-bot-name">
                <div class="mb-3">
                    <label class="form-label">Environment Variables</label>
                    <textarea id="edit-env-vars" class="form-control font-monospace" rows="6"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" onclick="saveConfig()">Save & Apply</button>
            </div>
        </div>
    </div>
</div>

<!-- Logs Modal -->
<div class="modal fade" id="logsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-dark">
                <h5 class="modal-title text-info">📝 Live Logs - <span id="log-bot-name"></span></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-2">
                <pre id="log-viewer">Loading logs...</pre>
            </div>
            <div class="modal-footer p-1 bg-dark">
                <button type="button" class="btn btn-sm btn-secondary" onclick="refreshLogs()">🔄 Refresh</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentLogBot = "";

    // Copy bot link function
    function copyWebLink(botName) {
        let fullUrl = window.location.origin + "/view/" + botName + "/";
        navigator.clipboard.writeText(fullUrl).then(() => {
            alert("✅ Link Copied Successfully!\n\nUse this link in your bot's Stream URL, FQDN or Web URL:\n\n" + fullUrl);
        }).catch(err => {
            alert("❌ Copy failed: " + err);
        });
    }

    function updateStatus() {
        $.getJSON('/status', function(data) {
            let rows = '';
            if(data.length === 0) {
                rows = '<tr><td colspan="4" class="text-center text-secondary p-4">No bots deployed. Start one above!</td></tr>';
            } else {
                $.each(data, function(key, bot) {
                    let statusClass = "status-loading";
                    if(bot.status.includes("Running")) statusClass = "status-running";
                    if(bot.status.includes("Stopped") || bot.status.includes("Crashed")) statusClass = "status-stopped";

                    let mainBtn = bot.running 
                        ? `<a href="/stop/${bot.name}" class="btn btn-warning btn-sm fw-bold">🛑 Stop</a>`
                        : `<a href="/start/${bot.name}" class="btn btn-success btn-sm fw-bold">▶️ Start</a>`;
                    
                    let webBtn = bot.running
                        ? `<a href="/view/${bot.name}/" target="_blank" class="btn btn-web btn-sm fw-bold ms-1" title="Open Web Interface">🌐 Web</a>`
                        : `<button class="btn btn-secondary btn-sm fw-bold ms-1" disabled title="Bot is stopped">🌐 Web</button>`;

                    let copyBtn = `<button class="btn btn-outline-info btn-sm ms-1 fw-bold border" onclick="copyWebLink('${bot.name}')" title="Copy Shareable Public Link">🔗 Copy Link</button>`;
                    
                    rows += `
                    <tr>
                        <td>
                            <div class="fw-bold text-white">${bot.name}</div>
                            <div class="text-info font-monospace small">Port: ${bot.port}</div>
                        </td>
                        <td>
                            <span class="stats-badge text-warning">💾 RAM: ${bot.ram} MB</span><br>
                            <span class="stats-badge text-info mt-1 d-inline-block">⚡ CPU: ${bot.cpu}%</span>
                        </td>
                        <td class="${statusClass} small">${bot.status}</td>
                        <td>
                            ${mainBtn}
                            ${webBtn}
                            ${copyBtn}
                            <a href="/update/${bot.name}" class="btn btn-primary btn-sm fw-bold ms-1" title="Pull Latest Code & Restart">🔄 Update</a>
                            <button class="btn btn-dark btn-sm ms-1 border" onclick="openLogs('${bot.name}')">📝 Logs</button>
                            <button class="btn btn-info btn-sm ms-1 fw-bold" onclick="openConfig('${bot.name}')">⚙️</button>
                            <a href="/delete/${bot.name}" class="btn btn-danger btn-sm ms-2">🗑️</a>
                        </td>
                    </tr>`;
                });
            }
            $('#bot-table-body').html(rows);
        });
    }

    function openConfig(botName) {
        $('#edit-bot-name').val(botName);
        $.getJSON('/get_config/' + botName, function(data) {
            $('#edit-env-vars').val(data.env);
            new bootstrap.Modal(document.getElementById('configModal')).show();
        });
    }

    function saveConfig() {
        let botName = $('#edit-bot-name').val();
        let envData = $('#edit-env-vars').val();
        $.post('/update_config/' + botName, { env_vars: envData }, function(resp) {
            alert("✅ Config Saved! Please click 'Update' or restart the bot to apply changes.");
            bootstrap.Modal.getInstance(document.getElementById('configModal')).hide();
        });
    }

    function openLogs(botName) {
        currentLogBot = botName;
        $('#log-bot-name').text(botName);
        $('#log-viewer').text("Loading logs...");
        new bootstrap.Modal(document.getElementById('logsModal')).show();
        refreshLogs();
    }

    function refreshLogs() {
        if (!currentLogBot) return;
        $.get('/logs/' + currentLogBot, function(data) {
            let viewer = $('#log-viewer');
            viewer.text(data);
            viewer.scrollTop(viewer[0].scrollHeight); // Auto scroll to bottom
        });
    }

    setInterval(updateStatus, 3000);
    setInterval(() => {
        if ($('#logsModal').is(':visible')) refreshLogs();
    }, 2000);
    
    updateStatus();
</script>

</body>
</html>
